syntax = "proto3";

package dashboard.v1;

option go_package = "lms/backend/gen/dashboard/v1;dashboardv1";

import "google/protobuf/timestamp.proto";

message JurusanCount {
  string jurusan = 1;
  int32 count = 2;
}

message KelasCount {
  string kelas = 1;
  int32 count = 2;
}

message RecentAssignment {
  string id = 1;
  string title = 2;
  string course_name = 3;
  google.protobuf.Timestamp deadline = 4;
  int32 submission_count = 5;
}

message RecentSubmission {
  string student_name = 1;
  string kelas = 2;
  string assignment_title = 3;
  google.protobuf.Timestamp submitted_at = 4;
  bool graded = 5;
}

message TeacherDashboard {
  int32 total_kelas = 1;
  int32 total_siswa = 2;
  int32 total_materi = 3;
  int32 total_tugas = 4;
  int32 total_pengumpulan = 5;     // submissions made
  int32 belum_kumpul = 6;          // expected submissions not yet made
  int32 perlu_dinilai = 7;         // submitted but not graded
  int32 materi_publikasi = 8;
  int32 materi_draft = 9;
  double rata_rata_nilai = 10;     // average of graded scores
  repeated JurusanCount siswa_per_jurusan = 11;
  repeated RecentAssignment tugas_terbaru = 12;
  repeated RecentSubmission pengumpulan_terbaru = 13;
  int32 total_guru = 14;
  repeated KelasCount siswa_per_kelas = 15;
  int32 siswa_laki = 16;       // number of male students
  int32 siswa_perempuan = 17;  // number of female students
}

message GetTeacherDashboardRequest {}

// One entry in a class/major leaderboard.
message RankEntry {
  int32 peringkat = 1;      // 1..5
  string name = 2;          // student full name
  string kelas = 3;         // student's class (useful in the major leaderboard)
  double rata_rata = 4;     // average graded score
}

// Student home summary: kelas/jurusan, average grade, and rank within the
// student's own class and major, plus top-5 leaderboards for both.
message StudentDashboard {
  string kelas = 1;
  string jurusan = 2;
  double rata_rata_nilai = 3;    // average of this student's graded scores
  int32 graded_count = 4;        // number of graded submissions
  int32 peringkat_kelas = 5;     // rank within same class (1 = best)
  int32 total_kelas = 6;         // number of students in the same class
  int32 peringkat_jurusan = 7;   // rank within same major
  int32 total_jurusan = 8;       // number of students in the same major
  repeated RankEntry juara_kelas = 9;    // top 5 in the same class
  repeated RankEntry juara_jurusan = 10; // top 5 in the same major
  repeated string all_kelas = 11;        // all class names (dropdown options)
  repeated string all_jurusan = 12;      // all major names (dropdown options)
}

message GetStudentDashboardRequest {}

// Leaderboard for an arbitrary class or major (exactly one of kelas/jurusan set).
message GetLeaderboardRequest {
  string kelas = 1;
  string jurusan = 2;
}

message Leaderboard {
  repeated RankEntry entries = 1;
}

service DashboardService {
  rpc GetTeacherDashboard(GetTeacherDashboardRequest) returns (TeacherDashboard);
  rpc GetStudentDashboard(GetStudentDashboardRequest) returns (StudentDashboard);
  rpc GetLeaderboard(GetLeaderboardRequest) returns (Leaderboard);
}
