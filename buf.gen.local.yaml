version: v2
clean: false
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: lms/backend/gen
plugins:
  - local: protoc-gen-go
    out: backend/gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: backend/gen
    opt: paths=source_relative
  - local: ["npx", "--yes", "@bufbuild/protoc-gen-es@2.12.1"]
    out: frontend/src/gen
    opt:
      - target=js+dts
inputs:
  - directory: protos
